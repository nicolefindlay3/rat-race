<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐀 RAT RACE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  /* ─── REPLACE THESE WITH YOUR SUPABASE CREDENTIALS ─────────────────────────
     After following setup-guide.md, paste your values below.               */
  :root {
    --bg: #0a0a0f; --panel: #12121a; --border: #2a2a40;
    --accent: #f5c842; --green: #4ade80; --text: #e8e8f0; --dim: #555570;
    --cat1: #e05252; --cat2: #4070c0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Press Start 2P', monospace;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  .wrapper { display:flex; gap:24px; align-items:flex-start; padding:20px; }
  .game-area { display:flex; flex-direction:column; align-items:center; gap:12px; }
  h1 { font-size:22px; color:var(--accent); text-shadow:0 0 20px #f5c84288, 3px 3px 0 #7a6420; letter-spacing:4px; }
  .subtitle { font-size:6px; color:var(--dim); letter-spacing:2px; }
  #gameCanvas { border:2px solid var(--border); box-shadow:0 0 40px #f5c84222; display:block; }
  .hud { display:flex; gap:24px; }
  .hud-item { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .hud-label { color:var(--dim); font-size:6px; }
  .hud-value { color:var(--accent); font-size:12px; text-shadow:0 0 10px #f5c84266; }
  .controls-hint { font-size:6px; color:var(--dim); text-align:center; line-height:2; }

  /* ── Scoreboard ── */
  .scoreboard { background:var(--panel); border:2px solid var(--border); padding:20px 16px; width:220px; min-height:340px; }
  .scoreboard h2 { font-size:9px; color:var(--accent); text-align:center; margin-bottom:16px; letter-spacing:2px; border-bottom:1px solid var(--border); padding-bottom:12px; }
  .score-entry { display:flex; justify-content:space-between; align-items:center; padding:7px 4px; border-bottom:1px solid #1a1a28; font-size:6px; animation:fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
  .score-rank { color:var(--dim); width:24px; flex-shrink:0; }
  .score-rank.gold { color:#f5c842; }
  .score-rank.silver { color:#aab0c0; }
  .score-rank.bronze { color:#cd7f32; }
  .score-name { color:var(--text); flex:1; margin:0 6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:90px; }
  .score-val { color:var(--green); flex-shrink:0; }
  .score-entry.new-entry { background:#1a2a1a; border-color:#2a4a2a; }
  .no-scores { color:var(--dim); font-size:6px; text-align:center; margin-top:20px; line-height:2.2; }
  .sb-status { font-size:5px; color:var(--dim); text-align:center; margin-top:8px; }
  .sb-status.connected { color:#4ade8088; }
  .sb-status.error { color:#e0525288; }

  /* ── Name Modal ── */
  #nameModal {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.85); z-index:100;
    align-items:center; justify-content:center; flex-direction:column; gap:20px;
  }
  #nameModal.visible { display:flex; }
  .modal-box {
    background:var(--panel); border:2px solid var(--border);
    padding:32px 28px; display:flex; flex-direction:column; align-items:center; gap:18px;
    box-shadow:0 0 60px #00000088;
    max-width:360px; width:90%;
  }
  .modal-box h3 { font-size:12px; color:var(--accent); text-align:center; line-height:1.8; }
  .modal-box p  { font-size:7px; color:var(--dim); text-align:center; line-height:2; }
  .modal-score  { font-size:16px; color:var(--green); }
  #playerName {
    background:#0d0d18; border:2px solid var(--border); color:var(--text);
    font-family:'Press Start 2P', monospace; font-size:10px;
    padding:10px 14px; width:100%; text-align:center;
    outline:none; letter-spacing:2px;
  }
  #playerName:focus { border-color:var(--accent); }
  .modal-btns { display:flex; gap:12px; width:100%; }
  .btn {
    font-family:'Press Start 2P', monospace; font-size:8px;
    padding:10px 16px; cursor:pointer; border:2px solid; flex:1;
    text-align:center; transition:all 0.15s;
  }
  .btn-primary { background:var(--accent); border-color:var(--accent); color:#000; }
  .btn-primary:hover { background:#d4a820; }
  .btn-skip { background:transparent; border-color:var(--dim); color:var(--dim); }
  .btn-skip:hover { border-color:var(--text); color:var(--text); }

  /* ── D-Pad Controls ── */
  .dpad {
    display: none;
    grid-template-columns: repeat(3, 52px);
    grid-template-rows: repeat(3, 52px);
    gap: 4px;
    margin-top: 4px;
    user-select: none;
  }
  @media (pointer: coarse) { .dpad { display: grid; } }
  .dpad-btn {
    background: #1a1c2e;
    border: 2px solid #2a3060;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    cursor: pointer;
    touch-action: none;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .dpad-btn:active, .dpad-btn.pressed { background: #2a3060; border-color: var(--accent); }
  .dpad-center { visibility: hidden; }
</style>
</head>
<body>

<!-- ── Name Entry Modal ─────────────────────────────────────────── -->
<div id="nameModal">
  <div class="modal-box">
    <h3>CAUGHT!</h3>
    <div class="modal-score" id="modalScore">0 pts</div>
    <p>Enter your name for the<br>global leaderboard:</p>
    <input id="playerName" type="text" maxlength="16" placeholder="YOUR NAME" autocomplete="off" spellcheck="false">
    <div class="modal-btns">
      <button class="btn btn-skip" onclick="submitScore(null)">SKIP</button>
      <button class="btn btn-primary" onclick="submitScore(document.getElementById('playerName').value)">SAVE</button>
    </div>
  </div>
</div>

<!-- ── Main Layout ─────────────────────────────────────────────── -->
<div class="wrapper">
  <div class="game-area">
    <h1>🐀 RAT RACE</h1>
    <p class="subtitle">SURVIVE THE CATS — EARN POINTS</p>
    <div class="hud">
      <div class="hud-item"><span class="hud-label">SCORE</span><span class="hud-value" id="scoreDisplay">0</span></div>
      <div class="hud-item"><span class="hud-label">TIME</span><span class="hud-value" id="timeDisplay">0s</span></div>
      <div class="hud-item"><span class="hud-label">BEST</span><span class="hud-value" id="bestDisplay">—</span></div>
    </div>
    <canvas id="gameCanvas" width="520" height="420"></canvas>
    <div class="controls-hint">ARROW KEYS / D-PAD TO MOVE &nbsp;|&nbsp; CLICK TO START</div>
    <div class="dpad" id="dpad">
      <div></div>
      <div class="dpad-btn" id="btn-up">▲</div>
      <div></div>
      <div class="dpad-btn" id="btn-left">◀</div>
      <div class="dpad-center"></div>
      <div class="dpad-btn" id="btn-right">▶</div>
      <div></div>
      <div class="dpad-btn" id="btn-down">▼</div>
      <div></div>
    </div>
  </div>

  <div class="scoreboard">
    <h2>🏆 LEADERBOARD</h2>
    <div id="scoreList"><p class="no-scores">Loading...</p></div>
    <p class="sb-status" id="sbStatus"></p>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  SUPABASE CONFIG — paste your values from setup-guide.md
// ═══════════════════════════════════════════════════════════════════
const SUPABASE_URL  = 'https://pygotatlaefnpdfophek.supabase.co';
const SUPABASE_KEY  = 'sb_publishable_unLtgtg-joS2NuAcC1uQcg_zovy_RIq';
// ═══════════════════════════════════════════════════════════════════

const USING_SUPABASE = SUPABASE_URL !== 'YOUR_SUPABASE_URL';
const CAT2_TIME = 20;
const TILE = 20;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let state = 'start';
let rat, cats, score, elapsed, lastTime;
let keys = {};
let localScores = [];  // fallback when Supabase not configured
let particles = [];
let obstacles = [];
let cheese = null, cheeseTimer = 0;
let cat2Warning = false, cat2WarnTimer = 0;
let pendingScore = 0;

// ─── SUPABASE API ──────────────────────────────────────────────────
async function sbFetch(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=minimal' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, opts);
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return method === 'GET' ? res.json() : res;
}

async function loadLeaderboard() {
  if (!USING_SUPABASE) { renderScoreboard(localScores); return; }
  try {
    const data = await sbFetch('high_scores?select=name,score&order=score.desc&limit=10');
    renderScoreboard(data);
    setStatus('🟢 GLOBAL LEADERBOARD', 'connected');
    // Update local best
    if (data.length) document.getElementById('bestDisplay').textContent = data[0].score;
  } catch(e) {
    console.warn('Supabase error:', e);
    renderScoreboard(localScores);
    setStatus('⚠ OFFLINE MODE', 'error');
  }
}

async function pushScore(name, scoreVal) {
  if (!USING_SUPABASE) {
    localScores.push({name, score: scoreVal});
    localScores.sort((a,b)=>b.score-a.score);
    if (localScores.length>10) localScores.length=10;
    renderScoreboard(localScores, scoreVal);
    return;
  }
  try {
    await sbFetch('high_scores', 'POST', { name: name.trim().slice(0,16) || 'RAT', score: scoreVal });
    await loadLeaderboard();
  } catch(e) {
    console.warn('Save error:', e);
    setStatus('⚠ SAVE FAILED', 'error');
  }
}

function setStatus(msg, cls) {
  const el = document.getElementById('sbStatus');
  el.textContent = msg; el.className = 'sb-status ' + cls;
}

function renderScoreboard(entries, highlight = null) {
  const el = document.getElementById('scoreList');
  if (!entries?.length) {
    el.innerHTML = '<p class="no-scores">No scores yet.<br><br>Be the first!</p>'; return;
  }
  const medals = ['gold','silver','bronze'], ranks = ['1ST','2ND','3RD'];
  el.innerHTML = entries.map((s,i) => {
    const isNew = highlight !== null && s.score === highlight && i === entries.findIndex(x=>x.score===highlight);
    return `<div class="score-entry${isNew?' new-entry':''}">
      <span class="score-rank ${medals[i]||''}">${ranks[i]||`${i+1}TH`}</span>
      <span class="score-name">${escHtml(s.name||'RAT')}</span>
      <span class="score-val">${s.score}</span>
    </div>`;
  }).join('');
  if (!USING_SUPABASE) setStatus('📵 LOCAL MODE — add Supabase for global scores', '');
}

function escHtml(s) { return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ─── SCORE MODAL ──────────────────────────────────────────────────
function showNameModal(scoreVal) {
  pendingScore = scoreVal;
  document.getElementById('modalScore').textContent = scoreVal + ' pts';
  document.getElementById('playerName').value = '';
  document.getElementById('nameModal').classList.add('visible');
  setTimeout(() => document.getElementById('playerName').focus(), 50);
}

function hideNameModal() { document.getElementById('nameModal').classList.remove('visible'); }

async function submitScore(rawName) {
  hideNameModal();
  const name = (rawName || 'RAT').trim() || 'RAT';
  await pushScore(name, pendingScore);
  // Show retry hint after brief pause
}

document.getElementById('playerName').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitScore(document.getElementById('playerName').value);
  e.stopPropagation(); // don't accidentally trigger game keys
});
document.getElementById('nameModal').addEventListener('keydown', e => e.stopPropagation());

// ─── OBSTACLES ────────────────────────────────────────────────────
function generateObstacles() {
  obstacles = [
    {x:80,  y:55,  w:70,  h:18}, {x:220, y:40,  w:18,  h:90},
    {x:310, y:55,  w:90,  h:18}, {x:430, y:80,  w:18,  h:110},
    {x:40,  y:170, w:110, h:18}, {x:230, y:150, w:90,  h:18},
    {x:370, y:190, w:100, h:18}, {x:110, y:250, w:18,  h:110},
    {x:190, y:290, w:150, h:18}, {x:370, y:270, w:18,  h:90},
    {x:40,  y:330, w:110, h:18}, {x:290, y:350, w:130, h:18},
    {x:460, y:305, w:18,  h:100},{x:210, y:210, w:18,  h:60},
  ];
}

// ─── COLLISION ────────────────────────────────────────────────────
function getObstacleHit(x, y, r) {
  for (let o of obstacles) {
    const nx = Math.max(o.x, Math.min(x, o.x+o.w));
    const ny = Math.max(o.y, Math.min(y, o.y+o.h));
    if ((x-nx)**2+(y-ny)**2 < r*r) return o;
  }
  return null;
}

function moveWithSlide(e, dx, dy) {
  if (!dx && !dy) return;
  const r = e.r;
  const clamp = (v,lo,hi)=>Math.max(lo,Math.min(hi,v));
  let tx=clamp(e.x+dx,r,W-r), ty=clamp(e.y+dy,r,H-r);
  if (!getObstacleHit(tx,ty,r)) { e.x=tx; e.y=ty; return; }
  if (!getObstacleHit(tx,e.y,r)) { e.x=tx; return; }
  if (!getObstacleHit(e.x,ty,r)) { e.y=ty; return; }
  const col=getObstacleHit(e.x,e.y,r);
  if (col) { const cx=col.x+col.w/2,cy=col.y+col.h/2,len=Math.hypot(e.x-cx,e.y-cy)||1; e.x+=((e.x-cx)/len)*2; e.y+=((e.y-cy)/len)*2; e.x=clamp(e.x,r,W-r); e.y=clamp(e.y,r,H-r); }
}

// ─── INIT ─────────────────────────────────────────────────────────
function initGame() {
  rat={x:W/2,y:H/2,r:10,speed:2.4,dx:0,dy:0,tail:[]};
  cats=[{x:30,y:30,r:13,speed:1.9,angle:0,stuckTimer:0,wanderAngle:0,wanderTimer:0,id:1}];
  score=0; elapsed=0; lastTime=null;
  particles=[]; cheese=null; cheeseTimer=0;
  cat2Warning=false; cat2WarnTimer=0;
  generateObstacles(); state='playing'; spawnCheese();
}

// ─── CHEESE ───────────────────────────────────────────────────────
function spawnCheese() {
  for (let i=0;i<300;i++) {
    const cx=40+Math.random()*(W-80), cy=40+Math.random()*(H-80);
    if (!getObstacleHit(cx,cy,14)&&dist(cx,cy,rat.x,rat.y)>100&&cats.every(c=>dist(cx,cy,c.x,c.y)>80)) { cheese={x:cx,y:cy,pulse:0}; return; }
  }
}

// ─── CAT AI ───────────────────────────────────────────────────────
function updateCat(cat, dt) {
  let dx=rat.x-cat.x, dy=rat.y-cat.y;
  const d=Math.hypot(dx,dy)||1;
  let mx=dx/d, my=dy/d;
  cat.wanderTimer=Math.max(0,cat.wanderTimer-dt);
  if (cat.wanderTimer>0) { mx=Math.cos(cat.wanderAngle); my=Math.sin(cat.wanderAngle); }
  else {
    const look=cat.r+24;
    if (getObstacleHit(cat.x+mx*look,cat.y+my*look,cat.r)) {
      const p1x=-my,p1y=mx,p2x=my,p2y=-mx;
      const ok1=!getObstacleHit(cat.x+p1x*look,cat.y+p1y*look,cat.r);
      const ok2=!getObstacleHit(cat.x+p2x*look,cat.y+p2y*look,cat.r);
      if (ok1&&(!ok2||(p1x*dx+p1y*dy)>=(p2x*dx+p2y*dy))) {mx=p1x;my=p1y;}
      else if (ok2) {mx=p2x;my=p2y;}
      else {cat.wanderAngle=Math.random()*Math.PI*2;cat.wanderTimer=0.5+Math.random()*0.4;mx=Math.cos(cat.wanderAngle);my=Math.sin(cat.wanderAngle);}
    }
  }
  const prevX=cat.x, prevY=cat.y;
  moveWithSlide(cat, mx*cat.speed*dt*60, my*cat.speed*dt*60);
  const moved=Math.hypot(cat.x-prevX,cat.y-prevY);
  if (moved<0.2&&cat.wanderTimer<=0) { cat.stuckTimer+=dt; if(cat.stuckTimer>0.25){cat.wanderAngle=Math.random()*Math.PI*2;cat.wanderTimer=0.5+Math.random()*0.5;cat.stuckTimer=0;} }
  else cat.stuckTimer=Math.max(0,cat.stuckTimer-dt*2);
  cat.angle=Math.atan2(rat.y-cat.y,rat.x-cat.x);
}

// ─── RAT ──────────────────────────────────────────────────────────
function updateRat(dt) {
  let dx=0,dy=0;
  if(keys['ArrowLeft']) dx-=1; if(keys['ArrowRight']) dx+=1;
  if(keys['ArrowUp'])   dy-=1; if(keys['ArrowDown'])  dy+=1;
  const len=Math.hypot(dx,dy); if(len>0){dx/=len;dy/=len;}
  moveWithSlide(rat,dx*rat.speed*dt*60,dy*rat.speed*dt*60);
  rat.dx=dx; rat.dy=dy;
  rat.tail.unshift({x:rat.x,y:rat.y});
  if(rat.tail.length>14) rat.tail.pop();
}

// ─── PARTICLES ────────────────────────────────────────────────────
function spawnParticles(x,y,color,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*3.5;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.022+Math.random()*0.03,size:2+Math.random()*4,color});}}
function updateParticles(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.vy+=0.08*dt*60;p.life-=p.decay*dt*60;if(p.life<=0)particles.splice(i,1);}}

// ─── HELPERS ──────────────────────────────────────────────────────
function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by);}
function getPPS(){return 1+Math.floor(elapsed/12);}

// ─── DRAWING ──────────────────────────────────────────────────────
function drawBg(){
  ctx.fillStyle='#0d0d18';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#14142a';ctx.lineWidth=1;
  for(let x=0;x<W;x+=TILE){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=TILE){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawObstacle(o){
  ctx.fillStyle='#1a1c2e';ctx.fillRect(o.x,o.y,o.w,o.h);
  ctx.strokeStyle='#2a3060';ctx.lineWidth=1;ctx.strokeRect(o.x+1,o.y+1,o.w-2,o.h-2);
  ctx.strokeStyle='#1e2248';
  if(o.w>30){ctx.beginPath();ctx.moveTo(o.x+o.w/2,o.y);ctx.lineTo(o.x+o.w/2,o.y+o.h);ctx.stroke();}
  if(o.h>30){ctx.beginPath();ctx.moveTo(o.x,o.y+o.h/2);ctx.lineTo(o.x+o.w,o.y+o.h/2);ctx.stroke();}
}

function drawRat(alpha){
  ctx.save();ctx.globalAlpha=alpha;ctx.translate(rat.x,rat.y);
  const angle=(rat.dx||rat.dy)?Math.atan2(rat.dy,rat.dx):0;ctx.rotate(angle);
  if(rat.tail.length>1){ctx.save();ctx.rotate(-angle);ctx.translate(-rat.x,-rat.y);ctx.strokeStyle='#a07848';ctx.lineCap='round';ctx.beginPath();ctx.moveTo(rat.tail[0].x,rat.tail[0].y);for(let i=1;i<rat.tail.length;i++){ctx.lineWidth=Math.max(0.5,2.2-i*0.16);ctx.lineTo(rat.tail[i].x,rat.tail[i].y);}ctx.stroke();ctx.restore();}
  ctx.fillStyle='#c49a5a';ctx.beginPath();ctx.ellipse(0,0,11,8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#d4a96a';ctx.beginPath();ctx.ellipse(10,0,8,6,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e8b88a';ctx.beginPath();ctx.ellipse(8,-6,4,3,-0.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#c4856a';ctx.beginPath();ctx.ellipse(8,-6,2,1.5,-0.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(15,-2,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(15.5,-2.5,0.7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e87090';ctx.beginPath();ctx.arc(18,0,1.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#e8d0a8';ctx.lineWidth=0.7;
  for(let s of[-1,1]){ctx.beginPath();ctx.moveTo(16,s*2);ctx.lineTo(22,s*4);ctx.stroke();ctx.beginPath();ctx.moveTo(16,s);ctx.lineTo(22,s);ctx.stroke();}
  ctx.restore();
}

function drawCat(cat){
  ctx.save();ctx.translate(cat.x,cat.y);ctx.rotate(cat.angle);
  const two=cat.id===2;
  const [bC,hC,eC,sC,iC,nC]=two?['#305090','#4070c0','#f0d020','#203570','#8090d0','#a0b8f0']:['#c04040','#e05252','#80e820','#a03030','#f08080','#f0a0a0'];
  ctx.fillStyle=bC;ctx.beginPath();ctx.ellipse(0,0,14,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=hC;ctx.beginPath();ctx.ellipse(13,0,10,9,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=hC;
  ctx.beginPath();ctx.moveTo(10,-9);ctx.lineTo(16,-16);ctx.lineTo(20,-9);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(6,-8);ctx.lineTo(10,-16);ctx.lineTo(14,-9);ctx.closePath();ctx.fill();
  ctx.fillStyle=iC;ctx.beginPath();ctx.moveTo(11,-9);ctx.lineTo(15,-14);ctx.lineTo(18,-9);ctx.closePath();ctx.fill();
  ctx.fillStyle=eC;ctx.beginPath();ctx.ellipse(16,-2,3,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.ellipse(16,-2,1,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(17.5,-3,0.8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=nC;ctx.beginPath();ctx.arc(22,0,2,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=bC;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(22,1);ctx.lineTo(20,4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(22,1);ctx.lineTo(24,4);ctx.stroke();
  ctx.strokeStyle='#ffffff88';ctx.lineWidth=0.8;
  for(let s of[-1,1]){ctx.beginPath();ctx.moveTo(20,s*2);ctx.lineTo(30,s*5);ctx.stroke();ctx.beginPath();ctx.moveTo(20,0);ctx.lineTo(30,0);ctx.stroke();}
  ctx.strokeStyle=sC;ctx.lineWidth=1.5;
  for(let i of[-5,0,5]){ctx.beginPath();ctx.moveTo(i-2,-8);ctx.lineTo(i,8);ctx.stroke();}
  ctx.restore();
}

function drawCheese(){
  ctx.save();ctx.translate(cheese.x,cheese.y);
  const sc=1+Math.sin(cheese.pulse)*0.1;ctx.scale(sc,sc);
  ctx.shadowColor='#f5c842';ctx.shadowBlur=16;
  ctx.fillStyle='#f5c842';ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(14,8);ctx.lineTo(-14,8);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;ctx.fillStyle='#c9962a';
  ctx.beginPath();ctx.arc(-4,2,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(6,4,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(1,-5,2,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawDanger(){
  for(let cat of cats){
    const d=dist(rat.x,rat.y,cat.x,cat.y),maxD=180;
    if(d<maxD){
      const intensity=(1-d/maxD)*0.22;
      const col=cat.id===2?'80,120,255':'255,50,50';
      ctx.save();const g=ctx.createRadialGradient(cat.x,cat.y,8,cat.x,cat.y,maxD);
      g.addColorStop(0,`rgba(${col},${intensity*0.9})`);g.addColorStop(1,`rgba(${col},0)`);
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(cat.x,cat.y,maxD,0,Math.PI*2);ctx.fill();ctx.restore();
    }
  }
}

function drawCat2Warning(){
  if(Math.floor(cat2WarnTimer*4)%2===0)return;
  ctx.save();ctx.font='9px "Press Start 2P"';ctx.textAlign='center';
  ctx.fillStyle='#4070c0';ctx.shadowColor='#4070c0';ctx.shadowBlur=18;
  ctx.fillText('⚠  2ND CAT INCOMING!  ⚠',W/2,24);ctx.restore();
}

function drawStartScreen(){
  ctx.fillStyle='rgba(0,0,0,0.84)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#f5c842';ctx.font='20px "Press Start 2P"';ctx.textAlign='center';
  ctx.fillText('🐀 RAT RACE',W/2,H/2-75);
  ctx.fillStyle='#888899';ctx.font='7px "Press Start 2P"';
  ctx.fillText('A cat is hunting you.',W/2,H/2-32);
  ctx.fillText('Survive as long as you can!',W/2,H/2-16);
  ctx.fillText('Grab cheese for bonus points!',W/2,H/2+1);
  ctx.fillStyle='#6080d0';ctx.font='6px "Press Start 2P"';
  ctx.fillText(`A 2nd cat joins after ${CAT2_TIME}s!`,W/2,H/2+20);
  const blink=Math.floor(Date.now()/500)%2;
  ctx.fillStyle='#4ade80';ctx.font='9px "Press Start 2P"';
  if(blink)ctx.fillText('CLICK TO START',W/2,H/2+58);
  ctx.fillStyle='#555570';ctx.font='6px "Press Start 2P"';
  ctx.fillText('ARROW KEYS TO MOVE',W/2,H/2+80);
}

function drawDeadScreen(){
  ctx.fillStyle='rgba(0,0,0,0.82)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#e05252';ctx.font='16px "Press Start 2P"';ctx.textAlign='center';
  ctx.fillText('CAUGHT!',W/2,H/2-40);
  const blink=Math.floor(Date.now()/500)%2;
  ctx.fillStyle='#4ade80';ctx.font='9px "Press Start 2P"';
  if(blink)ctx.fillText('CLICK TO RETRY',W/2,H/2+20);
}

// ─── GAME LOOP ────────────────────────────────────────────────────
function loop(ts){
  if(!lastTime)lastTime=ts;
  const dt=Math.min((ts-lastTime)/1000,0.05);lastTime=ts;

  if(state==='playing'){
    elapsed+=dt; score+=getPPS()*dt;
    updateRat(dt);

    if(cats.length===1){
      if(elapsed>=CAT2_TIME-3&&elapsed<CAT2_TIME){cat2Warning=true;cat2WarnTimer=elapsed-(CAT2_TIME-3);}
      if(elapsed>=CAT2_TIME){
        cat2Warning=false;
        const sx=rat.x<W/2?W-30:30,sy=rat.y<H/2?H-30:30;
        cats.push({x:sx,y:sy,r:13,speed:2.1,angle:0,stuckTimer:0,wanderAngle:0,wanderTimer:0,id:2});
        spawnParticles(sx,sy,'#4070c0',22);
      }
    }

    for(let cat of cats){cat.speed=(cat.id===1?1.9:2.1)+elapsed*0.018;updateCat(cat,dt);}
    updateParticles(dt);

    if(cheese){cheese.pulse+=dt*3;if(dist(rat.x,rat.y,cheese.x,cheese.y)<18){score+=10+Math.floor(elapsed/5)*5;spawnParticles(cheese.x,cheese.y,'#f5c842',20);cheese=null;cheeseTimer=4+Math.random()*8;}}
    else{cheeseTimer-=dt;if(cheeseTimer<=0)spawnCheese();}

    for(let cat of cats){
      if(dist(rat.x,rat.y,cat.x,cat.y)<rat.r+cat.r-5){
        state='dead';
        spawnParticles(rat.x,rat.y,'#d4a96a',28);
        spawnParticles(cat.x,cat.y,cat.id===2?'#4070c0':'#e05252',18);
        const finalScore=Math.floor(score);
        setTimeout(()=>showNameModal(finalScore), 600);
        break;
      }
    }

    document.getElementById('scoreDisplay').textContent=Math.floor(score);
    document.getElementById('timeDisplay').textContent=Math.floor(elapsed)+'s';
  }

  drawBg();
  for(let o of obstacles)drawObstacle(o);
  if(state!=='start'){
    drawDanger();
    if(cheese)drawCheese();
    for(let p of particles){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();ctx.restore();}
    drawRat(state==='dead'?0.5:1);
    for(let cat of cats)drawCat(cat);
    if(cat2Warning)drawCat2Warning();
  }
  if(state==='start')drawStartScreen();
  if(state==='dead')drawDeadScreen();
  requestAnimationFrame(loop);
}

// ─── INPUT ────────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

// Click or tap canvas to start / restart
canvas.addEventListener('click',()=>{ if(state!=='playing')initGame(); });
canvas.addEventListener('touchstart',e=>{ e.preventDefault(); if(state!=='playing')initGame(); },{passive:false});

// ─── START ────────────────────────────────────────────────────────

// ─── D-PAD TOUCH CONTROLS ─────────────────────────────────────────
(function() {
  const map = {
    'btn-up':    'ArrowUp',
    'btn-down':  'ArrowDown',
    'btn-left':  'ArrowLeft',
    'btn-right': 'ArrowRight'
  };
  Object.entries(map).forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (!el) return;
    const press   = e => { e.preventDefault(); keys[key] = true;  el.classList.add('pressed'); };
    const release = e => { e.preventDefault(); keys[key] = false; el.classList.remove('pressed'); };
    el.addEventListener('touchstart',  press,   {passive: false});
    el.addEventListener('touchend',    release, {passive: false});
    el.addEventListener('touchcancel', release, {passive: false});
    el.addEventListener('mousedown',   press);
    el.addEventListener('mouseup',     release);
    el.addEventListener('mouseleave',  release);
  });
})();

loadLeaderboard();
requestAnimationFrame(loop);
</script>
