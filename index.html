<style>

:root{--bg:#0a0a0f;--panel:#12121a;--border:#2a2a40;--accent:#f5c842;--green:#4ade80;--text:#e8e8f0;--dim:#555570;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Press Start 2P',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;}

.score-entry{display:flex;justify-content:space-between;align-items:center;padding:8px 4px;border-bottom:1px solid #1a1a28;font-size:8px;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

// ═══════════════ AUDIO ══════════════════════════════════
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx=null, heartbeatInterval=null, lastBpm=0;

function getAudioCtx(){
  if(!audioCtx) audioCtx=new AudioCtx();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

// Single heartbeat thud: low kick + short decay
function playBeat(){
  if(state!=='playing') return;
  try{
    const ac=getAudioCtx();
    const now=ac.currentTime;

    // Low kick oscillator
    const osc=ac.createOscillator();
    const gain=ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type='sine';
    osc.frequency.setValueAtTime(120,now);
    osc.frequency.exponentialRampToValueAtTime(40,now+0.12);
    gain.gain.setValueAtTime(0.45,now);
    gain.gain.exponentialRampToValueAtTime(0.001,now+0.18);
    osc.start(now); osc.stop(now+0.2);

    // Soft click transient
    const osc2=ac.createOscillator();
    const gain2=ac.createGain();
    osc2.connect(gain2); gain2.connect(ac.destination);
    osc2.type='triangle';
    osc2.frequency.setValueAtTime(600,now);
    gain2.gain.setValueAtTime(0.15,now);
    gain2.gain.exponentialRampToValueAtTime(0.001,now+0.04);
    osc2.start(now); osc2.stop(now+0.05);
  }catch(e){}
}

function catSpeed(){
  // Average speed of all cats
  if(!cats||!cats.length) return 1.4;
  return cats.reduce((s,c)=>s+c.speed,0)/cats.length;
}

function updateHeartbeat(){
  if(state!=='playing'){ stopHeartbeat(); return; }
  // BPM: 60 at base speed 1.4, up to 160 at speed ~3.0
  const spd=catSpeed();
  const bpm=Math.round(60+((spd-1.4)/1.6)*100);
  const clampedBpm=Math.max(50,Math.min(160,bpm));
  if(Math.abs(clampedBpm-lastBpm)>2){
    lastBpm=clampedBpm;
    clearInterval(heartbeatInterval);
    heartbeatInterval=setInterval(playBeat,60000/clampedBpm);
  }
}

function stopHeartbeat(){
  clearInterval(heartbeatInterval);
  heartbeatInterval=null; lastBpm=0;
}

// ═══════════════ RAT COLOURS ════════════════════════════

  ['#c03030','#e04040','#f07070','#a02020','#802020','#f0a0a0'],  // 1 Red
  ['#2a9a50','#3aba60','#70da90','#1a7a40','#156030','#a0f0b0'],  // 2 Green
  ['#3060c0','#4080e0','#80b0f8','#2040a0','#183080','#b0d0ff'],  // 3 Blue
  ['#9030b0','#b050d0','#d080f0','#7020a0','#501080','#e0b0ff'],  // 4 Purple
  ['#c05010','#e07020','#f0a060','#a04010','#803010','#ffc090'],  // 5 Orange
  ['#c0c0c0','#e0e0e0','#f8f8f8','#a0a0a0','#808080','#ffffff'],  // 6 White

}

// ═══════════════ MAZE ═══════════════════════════════════

let currentLevel=0;
let MAP=[];

function loadLevel(lvlIdx){
  currentLevel=lvlIdx;
  MAP=LEVELS[lvlIdx].maze.map(r=>[...r].map(c=>c==='#'?1:0));
}

function isWall(c,r){return c<0||c>=COLS||r<0||r>=ROWS||MAP[r][c]===1;}

// ─── Tile-based collision ────────────────────────────────
// Check the 4 cardinal edge-points of a circle against wall tiles.
// cr = collision radius (kept at 8 so entities fit in 20px corridors).
function hitWall(x,y,cr){
  const p=cr*0.88;
  return isWall((x-p)/TILE|0, y/TILE|0)||
         isWall((x+p)/TILE|0, y/TILE|0)||
         isWall(x/TILE|0, (y-p)/TILE|0)||
         isWall(x/TILE|0, (y+p)/TILE|0);
}

function slide(e,dx,dy){
  if(!dx&&!dy)return;
  if(!hitWall(e.x+dx,e.y+dy,e.cr)){e.x+=dx;e.y+=dy;return;}
  if(!hitWall(e.x+dx,e.y,   e.cr)){e.x+=dx;return;}
  if(!hitWall(e.x,   e.y+dy,e.cr)){e.y+=dy;}
}

// ─── BFS (4-directional on tile grid) ────────────────────
function bfs(sx,sy,gx,gy){
  const sc=sx/TILE|0, sr=sy/TILE|0;
  const gc=gx/TILE|0, gr=gy/TILE|0;
  if(sc===gc&&sr===gr)return[];

  const key=(c,r)=>r*COLS+c;
  const vis=new Uint8Array(COLS*ROWS);
  const par=new Int32Array(COLS*ROWS).fill(-1);
  const sk=key(sc,sr),gk=key(gc,gr);
  const q=[sk]; vis[sk]=1;
  let found=false;

  while(q.length){
    const cur=q.shift();
    if(cur===gk){found=true;break;}
    const cc=cur%COLS,cr=(cur/COLS)|0;
    for(const[dc,dr]of[[1,0],[-1,0],[0,1],[0,-1]]){
      const nc=cc+dc,nr=cr+dr,nk=key(nc,nr);
      if(vis[nk]||isWall(nc,nr))continue;
      vis[nk]=1;par[nk]=cur;q.push(nk);
    }
  }
  if(!found)return[];

  const path=[];
  let cur=gk;
  while(cur!==sk&&par[cur]!==-1){
    const c=cur%COLS,r=(cur/COLS)|0;
    path.unshift({x:c*TILE+TILE/2,y:r*TILE+TILE/2});
    cur=par[cur];
  }
  return path;
}

function maxCheese(){
  // More cheese the longer you survive: starts at 1, +1 every 20s, cap 5
  return Math.min(5, 1 + Math.floor(elapsed/20));
}

function spawnCheese(){
  for(let i=0;i<400;i++){
    const col=1+Math.floor(Math.random()*(COLS-2));
    const row=1+Math.floor(Math.random()*(ROWS-2));
    if(isWall(col,row))continue;
    const cx=col*TILE+TILE/2,cy=row*TILE+TILE/2;
    if(dist(cx,cy,rat.x,rat.y)<60)continue;
    if(cats.every(c=>dist(cx,cy,c.x,c.y)>50) &&
       cheeses.every(ch=>dist(cx,cy,ch.x,ch.y)>60)){
      cheeses.push({x:cx,y:cy,pulse:Math.random()*Math.PI*2});
      return;
    }
  }
}

// ─── Cat AI ──────────────────────────────────────────────
function updateCat(cat,dt){
  cat.pathTimer-=dt;
  const d=dist(cat.x,cat.y,rat.x,rat.y);

  // Close enough → go straight (avoids waypoint overshoot near rat)
  if(d<TILE*1.5){
    const dx=rat.x-cat.x,dy=rat.y-cat.y,len=d||1;
    slide(cat,(dx/len)*cat.speed*dt*60,(dy/len)*cat.speed*dt*60);
    cat.angle=Math.atan2(dy,dx);
    return;
  }

  if(cat.pathTimer<=0||!cat.waypoints.length){
    cat.waypoints=bfs(cat.x,cat.y,rat.x,rat.y);
    cat.pathTimer=d<150?0.08:0.2;
  }

  if(!cat.waypoints.length){
    const dx=rat.x-cat.x,dy=rat.y-cat.y,len=d||1;
    slide(cat,(dx/len)*cat.speed*dt*60,(dy/len)*cat.speed*dt*60);
    cat.angle=Math.atan2(dy,dx);return;
  }

  const wp=cat.waypoints[0];
  const dx=wp.x-cat.x,dy=wp.y-cat.y,wd=Math.hypot(dx,dy);
  if(wd<TILE*0.55){cat.waypoints.shift();return;}
  slide(cat,(dx/wd)*cat.speed*dt*60,(dy/wd)*cat.speed*dt*60);
  cat.angle=Math.atan2(rat.y-cat.y,rat.x-cat.x);
}

function updateRat(dt){
  let dx=0,dy=0;
  if(keys['ArrowLeft'])dx-=1;if(keys['ArrowRight'])dx+=1;
  if(keys['ArrowUp'])dy-=1;if(keys['ArrowDown'])dy+=1;
  const len=Math.hypot(dx,dy);if(len>0){dx/=len;dy/=len;}
  slide(rat,dx*rat.speed*dt*60,dy*rat.speed*dt*60);
  rat.dx=dx;rat.dy=dy;
  rat.tail.unshift({x:rat.x,y:rat.y});
  if(rat.tail.length>14)rat.tail.pop();
}

function burst(x,y,col,n=14){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1.5+Math.random()*3;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:.02+Math.random()*.025,sz:2+Math.random()*4,col});}
}
function tickParticles(dt){
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.vy+=.07*dt*60;p.life-=p.decay*dt*60;if(p.life<=0)particles.splice(i,1);}
}

const dist=(ax,ay,bx,by)=>Math.hypot(ax-bx,ay-by);
const pps=()=>1+Math.floor(elapsed/12);

// ═══════════════ DRAWING ════════════════════════════════
function drawMaze(){
  // Floor
  ctx.fillStyle='#07070f';ctx.fillRect(0,0,W,H);
  // Floor dots
  ctx.fillStyle='#18182a';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)
    if(!MAP[r][c])ctx.fillRect(c*TILE+TILE/2-1,r*TILE+TILE/2-1,2,2);
  // Wall fill
  ctx.fillStyle='#10143a';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)
    if(MAP[r][c])ctx.fillRect(c*TILE,r*TILE,TILE,TILE);
  // Glowing wall-edge lines
  ctx.save();
  ctx.strokeStyle='#2244cc';ctx.lineWidth=2;
  ctx.shadowColor='#3355ff';ctx.shadowBlur=5;ctx.lineCap='square';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(!MAP[r][c])continue;
      const x=c*TILE,y=r*TILE;
      if(!isWall(c,r-1)){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+TILE,y);ctx.stroke();}
      if(!isWall(c,r+1)){ctx.beginPath();ctx.moveTo(x,y+TILE);ctx.lineTo(x+TILE,y+TILE);ctx.stroke();}
      if(!isWall(c-1,r)){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+TILE);ctx.stroke();}
      if(!isWall(c+1,r)){ctx.beginPath();ctx.moveTo(x+TILE,y);ctx.lineTo(x+TILE,y+TILE);ctx.stroke();}
    }
  }
  ctx.restore();
}

function drawRat(alpha){
  const[bodyCol,headCol,earCol,earInCol,tailCol,whiskCol]=RAT_PALETTES[ratPalette];
  ctx.save();ctx.globalAlpha=alpha;
  if(rat.tail.length>1){
    ctx.strokeStyle=tailCol;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(rat.tail[0].x,rat.tail[0].y);
    for(let i=1;i<rat.tail.length;i++){ctx.lineWidth=Math.max(.5,2.2-i*.15);ctx.lineTo(rat.tail[i].x,rat.tail[i].y);}
    ctx.stroke();
  }
  ctx.translate(rat.x,rat.y);
  const goLeft=rat.dx<-0.1;
  if(goLeft){ctx.scale(-1,1);ctx.rotate(Math.atan2(rat.dy,-rat.dx));}
  else ctx.rotate(Math.atan2(rat.dy,rat.dx));
  ctx.fillStyle=bodyCol;ctx.beginPath();ctx.ellipse(0,0,11,8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=headCol;ctx.beginPath();ctx.ellipse(10,0,8,6,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=earCol;ctx.beginPath();ctx.ellipse(8,-6,4,3,-.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=earInCol;ctx.beginPath();ctx.ellipse(8,-6,2,1.5,-.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(15,-2,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(15.5,-2.5,.7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e87090';ctx.beginPath();ctx.arc(18,0,1.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=whiskCol;ctx.lineWidth=.7;
  for(const s of[-1,1]){ctx.beginPath();ctx.moveTo(16,s*2);ctx.lineTo(22,s*4);ctx.stroke();ctx.beginPath();ctx.moveTo(16,s);ctx.lineTo(22,s);ctx.stroke();}
  ctx.restore();
}

function drawCat(cat){
  ctx.save();ctx.translate(cat.x,cat.y);
  const goLeft=Math.cos(cat.angle)<-0.1;
  if(goLeft){ctx.scale(-1,1);ctx.rotate(Math.PI-cat.angle);}
  else ctx.rotate(cat.angle);
  const two=cat.id===2;
  const[bC,hC,eC,sC,iC,nC]=two?['#305090','#4070c0','#f0d020','#203570','#8090d0','#a0b8f0']:['#c04040','#e05252','#80e820','#a03030','#f08080','#f0a0a0'];
  ctx.fillStyle=bC;ctx.beginPath();ctx.ellipse(0,0,14,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=hC;ctx.beginPath();ctx.ellipse(13,0,10,9,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=hC;
  ctx.beginPath();ctx.moveTo(10,-9);ctx.lineTo(16,-16);ctx.lineTo(20,-9);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(6,-8);ctx.lineTo(10,-16);ctx.lineTo(14,-9);ctx.closePath();ctx.fill();
  ctx.fillStyle=iC;ctx.beginPath();ctx.moveTo(11,-9);ctx.lineTo(15,-14);ctx.lineTo(18,-9);ctx.closePath();ctx.fill();
  ctx.fillStyle=eC;ctx.beginPath();ctx.ellipse(16,-2,3,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.ellipse(16,-2,1,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(17.5,-3,.8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=nC;ctx.beginPath();ctx.arc(22,0,2,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=bC;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(22,1);ctx.lineTo(20,4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(22,1);ctx.lineTo(24,4);ctx.stroke();
  ctx.strokeStyle='#ffffff88';ctx.lineWidth=.8;
  for(const s of[-1,1]){ctx.beginPath();ctx.moveTo(20,s*2);ctx.lineTo(30,s*5);ctx.stroke();ctx.beginPath();ctx.moveTo(20,0);ctx.lineTo(30,0);ctx.stroke();}
  ctx.strokeStyle=sC;ctx.lineWidth=1.5;
  for(const ii of[-5,0,5]){ctx.beginPath();ctx.moveTo(ii-2,-8);ctx.lineTo(ii,8);ctx.stroke();}
  ctx.restore();
}

function drawCheese(cheese){
  ctx.save();ctx.translate(cheese.x,cheese.y);
  const sc=1+Math.sin(cheese.pulse)*.1;ctx.scale(sc,sc);
  ctx.shadowColor='#f5c842';ctx.shadowBlur=16;
  ctx.fillStyle='#f5c842';ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(14,8);ctx.lineTo(-14,8);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;ctx.fillStyle='#c9962a';
  [[-4,2,3],[6,4,2],[1,-5,2]].forEach(([x,y,r])=>{ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();});
  ctx.restore();
}

function drawDanger(){
  for(const cat of cats){
    const d=dist(rat.x,rat.y,cat.x,cat.y),maxD=160;
    if(d<maxD){
      const col=cat.id===2?'80,120,255':'255,50,50';
      const g=ctx.createRadialGradient(cat.x,cat.y,6,cat.x,cat.y,maxD);
      g.addColorStop(0,`rgba(${col},${(1-d/maxD)*.18})`);g.addColorStop(1,`rgba(${col},0)`);
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(cat.x,cat.y,maxD,0,Math.PI*2);ctx.fill();
    }
  }
}

function drawStartScreen(){
  ctx.fillStyle='rgba(0,0,0,.86)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#f5c842';ctx.font='20px "Press Start 2P"';ctx.fillText('🐀 RAT RACE',W/2,H/2-75);
  ctx.fillStyle='#888899';ctx.font='7px "Press Start 2P"';
  ctx.fillText('Navigate the maze!',W/2,H/2-32);
  ctx.fillText('Survive the cats!',W/2,H/2-14);
  ctx.fillText('Grab cheese for bonus points!',W/2,H/2+6);
  ctx.fillStyle='#6080d0';ctx.font='6px "Press Start 2P"';
  ctx.fillText(`A 2nd cat joins after ${LEVELS[currentLevel].cat2Time}s!`,W/2,H/2+26);
  if(Math.floor(Date.now()/500)%2){
    ctx.fillStyle='#4ade80';ctx.font='9px "Press Start 2P"';ctx.fillText('CLICK TO START',W/2,H/2+58);
  }
  ctx.fillStyle='#555570';ctx.font='6px "Press Start 2P"';ctx.fillText('ARROW KEYS TO MOVE',W/2,H/2+80);
}

function drawDeadScreen(){
  ctx.fillStyle='rgba(0,0,0,.82)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#e05252';ctx.font='18px "Press Start 2P"';ctx.fillText('CAUGHT!',W/2,H/2-55);
  ctx.fillStyle='#f5c842';ctx.font='9px "Press Start 2P"';ctx.fillText('LEVEL '+(currentLevel+1),W/2,H/2-26);
  ctx.fillStyle='#aaaacc';ctx.font='7px "Press Start 2P"';
  ctx.fillText('CHANGE LEVEL BELOW',W/2,H/2-4);
  if(Math.floor(Date.now()/500)%2){
    ctx.fillStyle='#4ade80';ctx.font='9px "Press Start 2P"';ctx.fillText('CLICK TO RETRY',W/2,H/2+24);
  }
}

function drawCat2Warning(){
  if(Math.floor(cat2WarnTimer*4)%2===0)return;
  ctx.save();ctx.font='9px "Press Start 2P"';ctx.textAlign='center';
  ctx.fillStyle='#4070c0';ctx.shadowColor='#4070c0';ctx.shadowBlur=18;
  ctx.fillText('⚠  2ND CAT INCOMING!  ⚠',W/2,24);ctx.restore();
}

// ═══════════════ GAME LOOP ══════════════════════════════
function loop(ts){
  if(!lastTime)lastTime=ts;
  const dt=Math.min((ts-lastTime)/1000,.05);lastTime=ts;

  if(state==='playing'){
    elapsed+=dt;score+=pps()*dt;
    updateRat(dt);

    if(cats.length===1){
      const cat2t=LEVELS[currentLevel].cat2Time; if(elapsed>=cat2t-3&&elapsed<cat2t){cat2Warning=true;cat2WarnTimer=elapsed-(cat2t-3);}
      if(elapsed>=cat2t){
        cat2Warning=false;
        const sc=rat.x<W/2?24:1,sr=rat.y<H/2?19:1;
        const sx=sc*TILE+TILE/2,sy=sr*TILE+TILE/2;
        cats.push({x:sx,y:sy,r:12,cr:8,speed:LEVELS[currentLevel].cat2Speed,angle:0,pathTimer:0,waypoints:[],id:2});
        burst(sx,sy,'#4070c0',22);
      }
    }

    for(const cat of cats){
      const L=LEVELS[currentLevel];
      cat.speed=(cat.id===1?L.cat1Speed:L.cat2Speed)+Math.floor(score)*L.speedPerPt;
      updateCat(cat,dt);
    }
    tickParticles(dt);
    updateHeartbeat();

    // Animate and check pickups
    for(let i=cheeses.length-1;i>=0;i--){
      cheeses[i].pulse+=dt*3;
      if(dist(rat.x,rat.y,cheeses[i].x,cheeses[i].y)<18){
        score+=10+Math.floor(elapsed/5)*5;
        burst(cheeses[i].x,cheeses[i].y,'#f5c842',20);
        cheeses.splice(i,1);
      }
    }
    // Top up cheeses toward the current max
    cheeseTimer-=dt;
    if(cheeseTimer<=0){
      const needed=maxCheese()-cheeses.length;
      if(needed>0) spawnCheese();
      // Shorter respawn delay as game progresses
      cheeseTimer=Math.max(1.5, 4-elapsed*0.03);
    }

    // Death: rat centre within combined visual radii
    for(const cat of cats){
      if(dist(rat.x,rat.y,cat.x,cat.y)<rat.r+cat.r-4){
        state='dead';
        burst(rat.x,rat.y,'#d4a96a',28);
        burst(cat.x,cat.y,cat.id===2?'#4070c0':'#e05252',18);
        stopHeartbeat();
        const fs=Math.floor(score);
        setTimeout(()=>showNameModal(fs),600);
        break;
      }
    }

    document.getElementById('scoreDisplay').textContent=Math.floor(score);
    document.getElementById('timeDisplay').textContent=Math.floor(elapsed)+'s';
  }

  drawMaze();
  if(state!=='start'){
    drawDanger();
    for(const ch of cheeses)drawCheese(ch);
    for(const p of particles){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fill();ctx.restore();}
    drawRat(state==='dead'?.4:1);
    for(const cat of cats)drawCat(cat);
    if(cat2Warning)drawCat2Warning();
  }
  if(state==='start')drawStartScreen();
  if(state==='dead')drawDeadScreen();
  requestAnimationFrame(loop);
}

// ═══════════════ PROFANITY FILTER ═══════════════════════
const BLOCKED=['fuck','fuk','fvck','phuck','fuq','fck','shit','sh1t','sheit','shyt','ass','asshole','arsehole','bitch','biatch','bastard','cunt','cvnt','dick','dik','cock','c0ck','piss','prick','pussy','slut','whore','twat','wank','wanker','bollocks','arse','nigger','nigga','chink','spic','kike','gook','wetback','coon','jigaboo','sambo','redskin','raghead','towelhead','beaner','zipperhead','fag','fagg','faggot','dyke','tranny','retard','spaz','nazi','hitler','kkk'];
function hasProfanity(s){
  const n=s.toLowerCase().replace(/\s/g,'').replace(/0/g,'o').replace(/1/g,'i').replace(/3/g,'e').replace(/4/g,'a').replace(/5/g,'s').replace(/7/g,'t').replace(/@/g,'a').replace(/\$/g,'s').replace(/!/g,'i').replace(/[^a-z]/g,'');
  return BLOCKED.some(w=>n.includes(w));
}

// ═══════════════ SCORE MODAL ════════════════════════════
function showNameModal(finalScore){
  pendingScore=finalScore;
  document.getElementById('modalScore').textContent=finalScore+' pts';
  document.getElementById('playerName').value='';
  document.getElementById('nameModal').classList.add('visible');
  setTimeout(()=>document.getElementById('playerName').focus(),50);
}
function hideNameModal(){document.getElementById('nameModal').classList.remove('visible');}

async function submitScore(rawName){
  const name=(rawName||'').trim();
  if(!name){hideNameModal();await pushScore('RAT',pendingScore);return;}
  if(hasProfanity(name)){
    const inp=document.getElementById('playerName');
    inp.value='';inp.placeholder='CHOOSE ANOTHER NAME';
    inp.style.borderColor='#e05252';inp.style.color='#e05252';
    setTimeout(()=>{inp.placeholder='YOUR NAME';inp.style.borderColor='';inp.style.color='';},2000);
    return;
  }
  hideNameModal();
  await pushScore(name.slice(0,16),pendingScore);
}

document.getElementById('playerName').addEventListener('keydown',e=>{
  if(e.key==='Enter')submitScore(document.getElementById('playerName').value);
  e.stopPropagation();
});
document.getElementById('nameModal').addEventListener('keydown',e=>e.stopPropagation());

// ═══════════════ SUPABASE ═══════════════════════════════
async function sbFetch(path,method='GET',body=null){
  const h={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=minimal':''};
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{method,headers:h,body:body?JSON.stringify(body):null});
  if(!r.ok)throw new Error(r.status);
  return method==='GET'?r.json():r;
}

async function loadLeaderboard(){
  if(!USING_SB){renderBoard(localScores);return;}
  try{
    const d=await sbFetch('high_scores?select=name,score&order=score.desc&limit=20');
    renderBoard(d);setStatus('🟢 GLOBAL LEADERBOARD','connected');
    if(d.length)document.getElementById('bestDisplay').textContent=d[0].score;
  }catch(e){renderBoard(localScores);setStatus('⚠ OFFLINE','error');}
}

async function pushScore(name,scoreVal){
  if(!USING_SB){
    localScores.push({name,score:scoreVal});
    localScores.sort((a,b)=>b.score-a.score);
    if(localScores.length>20)localScores.length=20;
    renderBoard(localScores,scoreVal);return;
  }
  try{await sbFetch('high_scores','POST',{name:name||'RAT',score:scoreVal});await loadLeaderboard();}
  catch(e){setStatus('⚠ SAVE FAILED','error');}
}

async function incrementPlayCount(){
  if(!USING_SB){
    const el=document.getElementById('playCount');
    el.textContent=((parseInt(el.textContent)||0)+1).toLocaleString();return;
  }
  try{await sbFetch('plays','POST',{played_at:new Date().toISOString()});}catch(e){}
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/plays?select=id`,{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'count=exact','Range':'0-0'}});
    const range=r.headers.get('content-range');
    if(range){const t=parseInt(range.split('/')[1]);if(!isNaN(t))document.getElementById('playCount').textContent=t.toLocaleString();}
  }catch(e){}
}

function setStatus(msg,cls){const el=document.getElementById('sbStatus');el.textContent=msg;el.className='sb-status '+cls;}
function renderBoard(entries,hl=null){
  const el=document.getElementById('scoreList');
  if(!entries?.length){el.innerHTML='<p class="no-scores">No scores yet.<br><br>Be the first!</p>';return;}
  const medals=['gold','silver','bronze'],ranks=['1ST','2ND','3RD'];
  const hi=hl!=null?entries.findIndex(x=>x.score===hl):-1;
  el.innerHTML=entries.map((s,i)=>`<div class="score-entry${i===hi?' new-entry':''}"><span class="score-rank ${medals[i]||''}">${ranks[i]||`${i+1}TH`}</span><span class="score-name">${esc(s.name||'RAT')}</span><span class="score-val">${s.score}</span></div>`).join('');
  if(!USING_SB)setStatus('📵 LOCAL MODE','');
}
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ═══════════════ INPUT ══════════════════════════════════
window.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

function tryStart(){
  try{getAudioCtx();}catch(e){} // unlock audio on first gesture — never block game start
  if(state!=='playing'&&!document.getElementById('nameModal').classList.contains('visible'))initGame();
}
canvas.addEventListener('click',tryStart);
canvas.addEventListener('touchstart',e=>{e.preventDefault();tryStart();},{passive:false});

(function(){
  const base=document.getElementById('joystickBase'),knob=document.getElementById('joystickKnob');
  if(!base)return;
  const DEAD=12,MAX=54;let active=false;
  function apply(cx,cy){
    const rect=base.getBoundingClientRect(),ox=cx-(rect.left+rect.width/2),oy=cy-(rect.top+rect.height/2);
    const kx=Math.max(-MAX,Math.min(MAX,ox)),ky=Math.max(-MAX,Math.min(MAX,oy));
    knob.style.transform=`translate(calc(-50% + ${kx}px),calc(-50% + ${ky}px))`;
    keys['ArrowLeft']=ox<-DEAD;keys['ArrowRight']=ox>DEAD;keys['ArrowUp']=oy<-DEAD;keys['ArrowDown']=oy>DEAD;
  }
  function reset(){active=false;knob.style.transform='translate(-50%,-50%)';['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].forEach(k=>keys[k]=false);}
  base.addEventListener('touchstart',e=>{e.preventDefault();active=true;apply(e.touches[0].clientX,e.touches[0].clientY);tryStart();},{passive:false});
  base.addEventListener('touchmove', e=>{e.preventDefault();if(active)apply(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  base.addEventListener('touchend',  e=>{e.preventDefault();reset();},{passive:false});
  base.addEventListener('touchcancel',e=>{e.preventDefault();reset();},{passive:false});
})();

// ═══════════════ LEVEL UI ══════════════════════════════
function updateLevelUI(){
  document.querySelectorAll('.level-btn').forEach((b,i)=>b.classList.toggle('active',i===currentLevel));
}

function buildLevelButtons(){
  const wrap=document.getElementById('levelBtns');
  LEVELS.forEach((_,i)=>{
    const b=document.createElement('button');
    b.className='level-btn'+(i===0?' active':'');
    b.textContent='LVL '+(i+1);
    b.onclick=()=>{ currentLevel=i; updateLevelUI(); };
    wrap.appendChild(b);
  });
}

// ═══════════════ START ══════════════════════════════════
loadLeaderboard();
buildLevelButtons();
requestAnimationFrame(loop);
